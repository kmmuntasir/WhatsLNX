appId: com.whatslnx.app
productName: WhatsLNX
copyright: Copyright © 2026 Muntasir Billah Munna

afterPack: scripts/afterPack.js

directories:
  output: dist

linux:
  icon: assets/icons
  category: Network
  mimeTypes:
    - x-scheme-handler/whatsapp
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
    - target: snap
      arch:
        - x64
    - target: flatpak
      arch:
        - x64
  desktop:
    entry:
      Name: WhatsLNX
      Comment: Unofficial WhatsApp Desktop Client for Linux
      Categories: Network;InstantMessaging;Chat;
      StartupWMClass: WhatsLNX
      MimeType: x-scheme-handler/whatsapp
      Keywords: whatsapp;chat;messenger;message;

snap:
  confinement: classic
  grade: stable
  plugs:
    - audio-playback
    - audio-record
    - browser-support
    - camera
    - desktop
    - desktop-legacy
    - gsettings
    - hardware-observe
    - home
    - mount-observe
    - network
    - network-bind
    - network-observe
    - network-status
    - opengl
    - removable-media
    - screen-inhibit-control
    - unity7
    - wayland
    - x11
  stagePackages:
    - default

deb:
  depends:
    - libnotify4
    - libxtst6
    - libnss3
    - libxss1
    - libasound2
  afterInstall: scripts/postinstall.sh
  afterRemove: scripts/postremove.sh

appImage:
  license: LICENSE

flatpak:
  runtime: org.freedesktop.Platform
  runtimeVersion: "24.08"
  sdk: org.freedesktop.Sdk
  base: org.electronjs.Electron2.BaseApp
  baseVersion: "24.08"
  branch: stable
  useWaylandFlags: true
  license: LICENSE
  finishArgs:
    - --socket=x11
    - --socket=wayland
    - --share=ipc
    - --share=network
    - --device=dri
    - --socket=pulseaudio
    - --device=all
    - --filesystem=home
    - --talk-name=org.freedesktop.Notifications
    - --talk-name=org.kde.StatusNotifierWatcher
    - --talk-name=org.freedesktop.portal.Desktop
    - --talk-name=org.freedesktop.portal.FileChooser
    - --env=XCURSOR_PATH=/run/host/user-share/icons:/run/host/share/icons
    - --env=ELECTRON_TRASH=gio

publish:
  provider: github
  owner: kmmuntasir
  repo: WhatsLNX
