name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if version tag already exists
        id: version-check
        run: |
          VERSION="v$(jq -r .version package.json)"
          if git tag -l "$VERSION" | grep -q .; then
            echo "new_version=false" >> "$GITHUB_OUTPUT"
            echo "Tag $VERSION already exists — skipping release"
          else
            echo "new_version=true" >> "$GITHUB_OUTPUT"
            echo "Tag $VERSION does not exist — proceeding with release"
          fi

      - uses: actions/setup-node@v6
        if: steps.version-check.outputs.new_version == 'true'
        with:
          node-version: 24
          cache: npm

      - run: npm ci
        if: steps.version-check.outputs.new_version == 'true'

      - name: Build and publish to GitHub Releases
        if: steps.version-check.outputs.new_version == 'true'
        run: npm run build -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Import GPG Key
        if: steps.version-check.outputs.new_version == 'true'
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Debug GPG state
        if: steps.version-check.outputs.new_version == 'true'
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "=== Secret length: ${#GPG_PASSPHRASE} ==="
          gpg --list-secret-keys
          cat ~/.gnupg/gpg-agent.conf 2>/dev/null || echo "no gpg-agent.conf"
          cat ~/.gnupg/gpg.conf 2>/dev/null || echo "no gpg.conf"

      - name: Checkout gh-pages branch
        if: steps.version-check.outputs.new_version == 'true'
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Build APT repository
        if: steps.version-check.outputs.new_version == 'true'
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          mkdir -p apt-repo/pool/main
          mkdir -p apt-repo/dists/stable/main/binary-amd64

          if [ -d gh-pages/pool/main ]; then
            cp gh-pages/pool/main/*.deb apt-repo/pool/main/ 2>/dev/null || true
          fi

          cp whatslnx-archive-keyring.gpg apt-repo/
          cp dist/*.deb apt-repo/pool/main/

          cd apt-repo
          dpkg-scanpackages --arch amd64 pool/ > dists/stable/main/binary-amd64/Packages
          gzip -kf dists/stable/main/binary-amd64/Packages

          cd dists/stable
          apt-ftparchive release . > Release

          gpg --batch --yes --pinentry-mode loopback \
              --default-key kmmuntasir@gmail.com \
              --armor --detach-sign --sign --output Release.gpg Release
          gpg --batch --yes --pinentry-mode loopback \
              --default-key kmmuntasir@gmail.com \
              --clearsign --output InRelease Release

      - name: Deploy to GitHub Pages
        if: steps.version-check.outputs.new_version == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apt-repo
          publish_branch: gh-pages
