name: Bug Report
description: Report a problem with WhatsLNX
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill out the sections below.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this behavior?
      placeholder: |
        1. Open WhatsLNX
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: WhatsLNX version
      description: Which version are you running?
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: distro
    attributes:
      label: Linux distribution
      description: e.g. Ubuntu 24.04, Fedora 41, Arch Linux
    validations:
      required: true
  - type: dropdown
    id: de
    attributes:
      label: Desktop environment
      options:
        - GNOME
        - KDE Plasma
        - XFCE
        - Cinnamon
        - MATE
        - Other
    validations:
      required: true
  - type: dropdown
    id: display-server
    attributes:
      label: Display server
      options:
        - Wayland
        - X11
        - Not sure
    validations:
      required: true
  - type: dropdown
    id: package-format
    attributes:
      label: Package format
      options:
        - AppImage
        - DEB
        - Built from source
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Logs, screenshots, or any other relevant information.
